<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>รายงานผู้ลงทะเบียน</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sukhumvit Set", sans-serif;
    background: #f5f6fa;
    min-height: 100vh;
    padding: 30px 20px;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
  }
  .header {
    background: #fff;
    padding: 24px 28px;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }
  h1 {
    color: #2c3e50;
    font-size: 24px;
  }
  .stats {
    color: #16a34a;
    font-weight: 600;
    margin-top: 4px;
    font-size: 14px;
  }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  .btn-primary { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: #fff; }
  .btn-success { background: #10b981; color: #fff; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-light { background: #e5e7eb; color: #374151; }

  .search-bar {
    background: #fff;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    margin-bottom: 20px;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }
  .search-bar input:focus { outline: none; border-color: #16a34a; }

  .table-wrap {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead {
    background: #f8fafc;
  }
  th {
    text-align: left;
    padding: 14px 16px;
    font-size: 13px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 2px solid #e5e7eb;
  }
  td {
    padding: 14px 16px;
    border-bottom: 1px solid #f1f5f9;
    color: #334155;
    font-size: 14px;
  }
  tbody tr:hover { background: #f8fafc; }
  tbody tr:last-child td { border-bottom: none; }

  .empty {
    padding: 60px 20px;
    text-align: center;
    color: #94a3b8;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  .del-btn {
    padding: 6px 12px;
    background: #fee2e2;
    color: #dc2626;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .del-btn:hover { background: #fecaca; }

  @media (max-width: 640px) {
    th:nth-child(1), td:nth-child(1) { display: none; }
    .header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>รายงานผู้ลงทะเบียน</h1>
        <div class="stats" id="stats">ทั้งหมด 0 คน</div>
      </div>
      <div class="actions">
        <a href="index.html" class="btn btn-primary">+ ลงทะเบียนใหม่</a>
        <button class="btn btn-success" id="btnExport">⬇ Export CSV</button>
        <button class="btn btn-danger" id="btnClear">🗑 ล้างทั้งหมด</button>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="search" placeholder="🔍 ค้นหาด้วย ชื่อ / อีเมล / เบอร์โทร..." />
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>ชื่อ-นามสกุล</th>
            <th>อายุ</th>
            <th>อีเมล</th>
            <th>เบอร์โทร</th>
            <th>วันที่ลงทะเบียน</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none;">
        <div class="empty-icon">📋</div>
        <div>ยังไม่มีผู้ลงทะเบียน</div>
      </div>
    </div>
  </div>

<script>
  const API_BASE = '/api';
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');
  const search = document.getElementById('search');

  let cache = [];

  async function fetchAll() {
    try {
      const res = await fetch(API_BASE + '/registrations');
      if (!res.ok) throw new Error('Failed');
      cache = await res.json();
    } catch (err) {
      console.error(err);
      cache = [];
      alert('ไม่สามารถโหลดข้อมูลจากเซิร์ฟเวอร์ได้');
    }
  }
  async function deleteOne(id) {
    const res = await fetch(`${API_BASE}/registrations/${id}`, { method: 'DELETE' });
    return res.ok;
  }
  async function clearAll() {
    const res = await fetch(`${API_BASE}/registrations`, { method: 'DELETE' });
    return res.ok;
  }
  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleString('th-TH', {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function render() {
    const all = cache;
    const q = search.value.trim().toLowerCase();
    const filtered = q
      ? all.filter(r =>
          r.name.toLowerCase().includes(q) ||
          r.email.toLowerCase().includes(q) ||
          r.phone.toLowerCase().includes(q))
      : all;

    stats.textContent = `ทั้งหมด ${all.length} คน` + (q ? ` · พบ ${filtered.length} รายการ` : '');

    if (filtered.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      empty.querySelector('div:last-child').textContent =
        all.length === 0 ? 'ยังไม่มีผู้ลงทะเบียน' : 'ไม่พบรายการที่ค้นหา';
      return;
    }
    empty.style.display = 'none';
    tbody.innerHTML = filtered.map((r, i) => {
      const ageStr = r.age != null ? `${r.age} ปี` : '-';
      const dobStr = r.dob ? new Date(r.dob).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
      const ageCell = dobStr ? `<strong>${ageStr}</strong><br><small style="color:#94a3b8;">${dobStr}</small>` : ageStr;
      const created = r.created_at || r.createdAt;
      return `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${escapeHtml(r.name)}</strong></td>
          <td>${ageCell}</td>
          <td>${escapeHtml(r.email)}</td>
          <td>${escapeHtml(r.phone)}</td>
          <td>${fmtDate(created)}</td>
          <td><button class="del-btn" data-id="${r.id}">ลบ</button></td>
        </tr>
      `;
    }).join('');
  }

  async function refresh() {
    await fetchAll();
    render();
  }

  tbody.addEventListener('click', async (e) => {
    if (!e.target.classList.contains('del-btn')) return;
    const id = Number(e.target.dataset.id);
    if (!confirm('ลบรายการนี้?')) return;
    e.target.disabled = true;
    const ok = await deleteOne(id);
    if (!ok) { alert('ลบไม่สำเร็จ'); e.target.disabled = false; return; }
    await refresh();
  });

  search.addEventListener('input', render);

  document.getElementById('btnClear').addEventListener('click', async () => {
    if (cache.length === 0) return alert('ไม่มีข้อมูลให้ลบ');
    if (!confirm('ลบข้อมูลทั้งหมด? การกระทำนี้ไม่สามารถย้อนกลับได้')) return;
    const ok = await clearAll();
    if (!ok) return alert('ลบไม่สำเร็จ');
    await refresh();
  });

  document.getElementById('btnExport').addEventListener('click', () => {
    const list = cache;
    if (list.length === 0) return alert('ไม่มีข้อมูลให้ export');
    const header = ['ลำดับ', 'ชื่อ-นามสกุล', 'วันเกิด', 'อายุ', 'อีเมล', 'เบอร์โทร', 'วันที่ลงทะเบียน'];
    const rows = list.map((r, i) => [
      i + 1,
      r.name,
      r.dob ? new Date(r.dob).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }) : '',
      r.age != null ? r.age : '',
      r.email,
      r.phone,
      fmtDate(r.created_at || r.createdAt)
    ]);
    const csv = [header, ...rows]
      .map(row => row.map(c => `"${String(c).replace(/"/g, '""')}"`).join(','))
      .join('\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `registrations-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  });

  refresh();
  // Auto-refresh every 10 seconds for near-realtime updates
  setInterval(refresh, 10000);
</script>
</body>
</html>
