<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>จองทุเรียนบุฟเฟ่ต์</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #f59e0b;
    --primary-dark: #d97706;
    --accent: #10b981;
    --danger: #ef4444;
    --bg-grad: linear-gradient(135deg, #fde68a 0%, #f59e0b 50%, #92400e 100%);
    --text: #1f2937;
    --muted: #6b7280;
    --border: #e5e7eb;
    --surface: #fff;
    --bg: #fffbeb;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sukhumvit Set", "Noto Sans Thai", sans-serif;
    background: var(--bg-grad);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
    color: var(--text);
  }
  .card {
    background: var(--surface);
    border-radius: 20px;
    box-shadow: 0 25px 60px rgba(146, 64, 14, 0.35);
    padding: 32px;
    width: 100%;
    max-width: 640px;
  }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .brand-icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #fbbf24, #d97706);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  h1 { font-size: 22px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

  .progress { display: flex; gap: 6px; margin-bottom: 28px; }
  .progress-step {
    flex: 1; height: 6px; border-radius: 3px;
    background: var(--border); transition: background 0.3s;
  }
  .progress-step.active { background: var(--primary); }
  .progress-step.done { background: var(--accent); }

  .step { display: none; }
  .step.active { display: block; }

  .step-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .step-hint { color: var(--muted); font-size: 13px; margin-bottom: 18px; }

  /* People selector */
  .people-counter {
    display: flex; align-items: center; justify-content: center;
    gap: 24px; margin: 20px 0;
  }
  .counter-btn {
    width: 56px; height: 56px; border-radius: 50%;
    border: 2px solid var(--primary); background: var(--surface);
    color: var(--primary); font-size: 28px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .counter-btn:hover:not(:disabled) { background: var(--primary); color: #fff; }
  .counter-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .counter-value {
    font-size: 48px; font-weight: 700; min-width: 80px; text-align: center;
    color: var(--primary-dark);
  }
  .counter-label { text-align: center; color: var(--muted); font-size: 13px; }

  /* Date grid */
  .date-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px; margin-bottom: 8px;
  }
  .date-card {
    border: 2px solid var(--border); border-radius: 12px;
    padding: 12px 8px; text-align: center; cursor: pointer;
    background: var(--surface); transition: all 0.15s;
  }
  .date-card:hover:not(.disabled) { border-color: var(--primary); transform: translateY(-1px); }
  .date-card.selected { border-color: var(--primary); background: #fef3c7; }
  .date-card.disabled { opacity: 0.4; cursor: not-allowed; background: #f9fafb; }
  .date-day { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .date-num { font-size: 24px; font-weight: 700; margin: 2px 0; }
  .date-month { font-size: 11px; color: var(--muted); }
  .date-status { font-size: 10px; margin-top: 4px; color: var(--accent); }
  .date-card.disabled .date-status { color: var(--danger); }

  /* Slot grid */
  .slot-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .slot-card {
    border: 2px solid var(--border); border-radius: 12px;
    padding: 12px; cursor: pointer; background: var(--surface);
    transition: all 0.15s;
  }
  .slot-card:hover:not(.disabled) { border-color: var(--primary); transform: translateY(-1px); }
  .slot-card.selected { border-color: var(--primary); background: #fef3c7; }
  .slot-card.disabled { opacity: 0.4; cursor: not-allowed; background: #f9fafb; }
  .slot-time { font-size: 16px; font-weight: 700; }
  .slot-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .slot-card.disabled .slot-meta { color: var(--danger); }

  /* Form */
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .field input {
    width: 100%; padding: 12px 14px;
    border: 2px solid var(--border); border-radius: 10px;
    font-size: 15px; font-family: inherit;
    transition: border 0.15s;
  }
  .field input:focus { outline: none; border-color: var(--primary); }
  .field .err { color: var(--danger); font-size: 12px; margin-top: 4px; min-height: 14px; }

  /* Summary */
  .summary {
    background: var(--bg); border-radius: 12px;
    padding: 16px; margin-bottom: 16px; border: 1px dashed #fbbf24;
  }
  .summary-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
  .summary-row .label { color: var(--muted); }
  .summary-row .value { font-weight: 600; }

  .confirm-card {
    background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
    border: 2px solid var(--accent); border-radius: 16px;
    padding: 24px; text-align: center; margin-bottom: 16px;
  }
  .confirm-icon { font-size: 48px; margin-bottom: 8px; }
  .confirm-code {
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 32px; letter-spacing: 6px; font-weight: 700;
    color: var(--primary-dark); background: #fff;
    padding: 12px 20px; border-radius: 12px;
    display: inline-block; margin: 12px 0;
    border: 2px dashed var(--primary);
  }

  /* Buttons */
  .actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn {
    flex: 1; padding: 14px;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #d1d5db; }

  .alert {
    padding: 12px; border-radius: 10px; font-size: 13px;
    margin-bottom: 16px; display: none;
  }
  .alert.error { background: #fee2e2; color: #991b1b; display: block; }

  .empty { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 14px; }

  .admin-link {
    text-align: center; margin-top: 16px;
    font-size: 12px;
  }
  .admin-link a { color: var(--muted); text-decoration: none; }
  .admin-link a:hover { color: var(--primary-dark); }

  @media (max-width: 480px) {
    .card { padding: 24px 20px; }
    .counter-value { font-size: 40px; }
    .confirm-code { font-size: 26px; letter-spacing: 4px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🥭</div>
      <div>
        <h1>จองทุเรียนบุฟเฟ่ต์</h1>
        <div class="subtitle">เทศกาลทุเรียน 15-24 พฤษภาคม 2569</div>
      </div>
    </div>

    <div class="progress">
      <div class="progress-step active" id="ps-1"></div>
      <div class="progress-step" id="ps-2"></div>
      <div class="progress-step" id="ps-3"></div>
      <div class="progress-step" id="ps-4"></div>
      <div class="progress-step" id="ps-5"></div>
    </div>

    <div id="alert" class="alert"></div>

    <!-- Step 1: People -->
    <div class="step active" id="step-1">
      <div class="step-title">เลือกจำนวนคน</div>
      <div class="step-hint">รอบละไม่เกิน 100 คน</div>
      <div class="people-counter">
        <button class="counter-btn" id="dec-people">−</button>
        <div class="counter-value" id="people-value">2</div>
        <button class="counter-btn" id="inc-people">+</button>
      </div>
      <div class="counter-label">คน</div>
      <div class="actions">
        <button class="btn btn-primary" id="next-1">ถัดไป</button>
      </div>
    </div>

    <!-- Step 2: Date -->
    <div class="step" id="step-2">
      <div class="step-title">เลือกวันที่</div>
      <div class="step-hint">เฉพาะวันที่มีรอบว่างสำหรับ <span id="hint-people">2</span> คน</div>
      <div class="date-grid" id="date-grid"></div>
      <div class="actions">
        <button class="btn btn-secondary" data-back>ย้อนกลับ</button>
        <button class="btn btn-primary" id="next-2" disabled>ถัดไป</button>
      </div>
    </div>

    <!-- Step 3: Time -->
    <div class="step" id="step-3">
      <div class="step-title">เลือกรอบเวลา</div>
      <div class="step-hint" id="time-hint">รอบละ 1 ชั่วโมง</div>
      <div class="slot-grid" id="slot-grid"></div>
      <div class="actions">
        <button class="btn btn-secondary" data-back>ย้อนกลับ</button>
        <button class="btn btn-primary" id="next-3" disabled>ถัดไป</button>
      </div>
    </div>

    <!-- Step 4: Form -->
    <div class="step" id="step-4">
      <div class="step-title">กรอกข้อมูลผู้จอง</div>
      <div class="step-hint" id="form-hint"></div>
      <form id="booking-form" novalidate>
        <div class="field">
          <label for="f-name">ชื่อ - นามสกุล</label>
          <input type="text" id="f-name" autocomplete="name" required />
          <div class="err" data-err="name"></div>
        </div>
        <div class="field">
          <label for="f-phone">เบอร์โทรศัพท์</label>
          <input type="tel" id="f-phone" inputmode="tel" autocomplete="tel" placeholder="0xx-xxx-xxxx" required />
          <div class="err" data-err="phone"></div>
        </div>
        <div class="field">
          <label for="f-email">อีเมล</label>
          <input type="email" id="f-email" autocomplete="email" placeholder="you@example.com" required />
          <div class="err" data-err="email"></div>
        </div>
        <div class="actions">
          <button type="button" class="btn btn-secondary" data-back>ย้อนกลับ</button>
          <button type="submit" class="btn btn-primary" id="submit-booking">ยืนยันการจอง</button>
        </div>
      </form>
    </div>

    <!-- Step 5: Confirmation -->
    <div class="step" id="step-5">
      <div class="confirm-card">
        <div class="confirm-icon">✅</div>
        <div style="font-size:18px; font-weight:600; color:#065f46;">จองสำเร็จ!</div>
        <div style="font-size:13px; color:#047857; margin-top:4px;">กรุณาบันทึกรหัสนี้เพื่อแสดงในวันใช้สิทธิ์</div>
        <div class="confirm-code" id="conf-code">------</div>
        <div style="font-size:12px; color:var(--muted);">รหัสยืนยัน 6 หลัก</div>
      </div>
      <div class="summary" id="conf-summary"></div>
      <div class="actions">
        <button class="btn btn-primary" id="new-booking">จองรอบใหม่</button>
      </div>
    </div>

    <div class="admin-link"><a href="/admin.html">เข้าสู่ระบบหลังบ้าน →</a></div>
  </div>

<script>
const TH_MONTH_SHORT = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const TH_MONTH_LONG  = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const TH_DAY_SHORT   = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];

const state = {
  step: 1,
  people: 2,
  date: null,
  time: null,
  config: null,
  availability: null,
};

const $ = id => document.getElementById(id);

function setStep(n) {
  state.step = n;
  document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
  $(`step-${n}`).classList.add('active');
  for (let i = 1; i <= 5; i++) {
    const ps = $(`ps-${i}`);
    ps.classList.remove('active', 'done');
    if (i < n) ps.classList.add('done');
    else if (i === n) ps.classList.add('active');
  }
  hideAlert();
}

function showAlert(msg) {
  const a = $('alert');
  a.textContent = msg;
  a.className = 'alert error';
}
function hideAlert() {
  $('alert').className = 'alert';
}

function fmtDateLong(iso) {
  const d = new Date(iso + 'T00:00:00');
  return `${d.getDate()} ${TH_MONTH_LONG[d.getMonth()]} ${d.getFullYear() + 543}`;
}

// ─── Step 1: people ────────────────────────────────────────
function updatePeople() {
  $('people-value').textContent = state.people;
  $('hint-people').textContent = state.people;
  $('dec-people').disabled = state.people <= 1;
  $('inc-people').disabled = state.people >= 100;
}
$('inc-people').onclick = () => { if (state.people < 100) { state.people++; updatePeople(); } };
$('dec-people').onclick = () => { if (state.people > 1)   { state.people--; updatePeople(); } };
$('next-1').onclick = async () => {
  await loadAvailability();
  renderDates();
  setStep(2);
};

// ─── Step 2: date ──────────────────────────────────────────
async function loadAvailability() {
  if (!state.config) {
    const cfg = await fetch('/api/config').then(r => r.json());
    state.config = cfg;
  }
  const av = await fetch(`/api/availability?people=${state.people}`).then(r => r.json());
  state.availability = av;
}

function dateHasAvailableSlot(date) {
  const slots = state.availability.slots[date];
  return Object.values(slots).some(s => s.available);
}

function renderDates() {
  const grid = $('date-grid');
  grid.innerHTML = '';
  const dates = state.config.dates;
  for (const date of dates) {
    const d = new Date(date + 'T00:00:00');
    const has = dateHasAvailableSlot(date);
    const card = document.createElement('div');
    card.className = 'date-card' + (has ? '' : ' disabled') + (state.date === date ? ' selected' : '');
    card.innerHTML = `
      <div class="date-day">${TH_DAY_SHORT[d.getDay()]}</div>
      <div class="date-num">${d.getDate()}</div>
      <div class="date-month">${TH_MONTH_SHORT[d.getMonth()]}</div>
      <div class="date-status">${has ? 'มีรอบว่าง' : 'เต็ม'}</div>
    `;
    if (has) {
      card.onclick = () => {
        state.date = date;
        renderDates();
        $('next-2').disabled = false;
      };
    }
    grid.appendChild(card);
  }
  $('next-2').disabled = !state.date || !dateHasAvailableSlot(state.date);
}

$('next-2').onclick = () => {
  renderSlots();
  setStep(3);
};

// ─── Step 3: time ──────────────────────────────────────────
function renderSlots() {
  $('time-hint').textContent = `วันที่ ${fmtDateLong(state.date)} • รอบละ 1 ชั่วโมง`;
  const grid = $('slot-grid');
  grid.innerHTML = '';
  const slots = state.availability.slots[state.date];
  const slotKeys = state.config.slots;
  for (const time of slotKeys) {
    const info = slots[time];
    const endHour = String(parseInt(time, 10) + 1).padStart(2, '0') + ':00';
    const card = document.createElement('div');
    card.className = 'slot-card' + (info.available ? '' : ' disabled') + (state.time === time ? ' selected' : '');
    card.innerHTML = `
      <div class="slot-time">${time} - ${endHour}</div>
      <div class="slot-meta">${info.available ? `เหลือ ${info.remaining} ที่นั่ง` : 'เต็ม'}</div>
    `;
    if (info.available) {
      card.onclick = () => {
        state.time = time;
        renderSlots();
        $('next-3').disabled = false;
      };
    }
    grid.appendChild(card);
  }
  $('next-3').disabled = !state.time || !slots[state.time]?.available;
}

$('next-3').onclick = () => {
  const endHour = String(parseInt(state.time, 10) + 1).padStart(2, '0') + ':00';
  $('form-hint').textContent =
    `${state.people} คน • ${fmtDateLong(state.date)} • ${state.time} - ${endHour}`;
  setStep(4);
};

// ─── Step 4: form ──────────────────────────────────────────
function clearErrors() {
  document.querySelectorAll('[data-err]').forEach(el => el.textContent = '');
}
function setError(field, msg) {
  document.querySelector(`[data-err="${field}"]`).textContent = msg;
}

$('booking-form').onsubmit = async (e) => {
  e.preventDefault();
  clearErrors();
  hideAlert();

  const name  = $('f-name').value.trim();
  const phone = $('f-phone').value.trim();
  const email = $('f-email').value.trim();

  let ok = true;
  if (!name) { setError('name', 'กรุณากรอกชื่อ-นามสกุล'); ok = false; }
  if (!/^[0-9\-+\s()]{9,15}$/.test(phone)) { setError('phone', 'เบอร์โทรไม่ถูกต้อง'); ok = false; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('email', 'รูปแบบอีเมลไม่ถูกต้อง'); ok = false; }
  if (!ok) return;

  const btn = $('submit-booking');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';

  try {
    const res = await fetch('/api/booking', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name, phone, email,
        num_people: state.people,
        booking_date: state.date,
        time_slot: state.time,
      }),
    });
    const data = await res.json();
    if (!res.ok) {
      if (data.fields) {
        for (const [k, v] of Object.entries(data.fields)) setError(k, v);
      } else if (data.error === 'full') {
        showAlert(`ขออภัย รอบนี้เต็มแล้ว เหลือเพียง ${data.remaining} ที่นั่ง — กรุณาเลือกรอบใหม่`);
        await loadAvailability();
      } else {
        showAlert(data.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
      }
      return;
    }
    renderConfirm(data);
    setStep(5);
  } catch (err) {
    showAlert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
  } finally {
    btn.disabled = false; btn.textContent = 'ยืนยันการจอง';
  }
};

// ─── Step 5: confirmation ──────────────────────────────────
function renderConfirm(b) {
  $('conf-code').textContent = b.code;
  const endHour = String(parseInt(b.time_slot, 10) + 1).padStart(2, '0') + ':00';
  $('conf-summary').innerHTML = `
    <div class="summary-row"><span class="label">ชื่อ - นามสกุล</span><span class="value">${escapeHtml(b.name)}</span></div>
    <div class="summary-row"><span class="label">เบอร์โทรศัพท์</span><span class="value">${escapeHtml(b.phone)}</span></div>
    <div class="summary-row"><span class="label">อีเมล</span><span class="value">${escapeHtml(b.email)}</span></div>
    <div class="summary-row"><span class="label">จำนวนคน</span><span class="value">${b.num_people} คน</span></div>
    <div class="summary-row"><span class="label">วันที่</span><span class="value">${fmtDateLong(b.booking_date)}</span></div>
    <div class="summary-row"><span class="label">รอบเวลา</span><span class="value">${b.time_slot} - ${endHour}</span></div>
  `;
}

$('new-booking').onclick = () => {
  state.date = null;
  state.time = null;
  $('booking-form').reset();
  clearErrors();
  setStep(1);
};

// ─── Back buttons ──────────────────────────────────────────
document.querySelectorAll('[data-back]').forEach(b => {
  b.onclick = () => setStep(state.step - 1);
});

// ─── Helpers ───────────────────────────────────────────────
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;',
  }[c]));
}

updatePeople();
</script>
</body>
</html>
